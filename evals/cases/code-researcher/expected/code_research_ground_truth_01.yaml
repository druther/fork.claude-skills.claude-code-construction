# Ground truth: Egress gap analysis for Holabird Academy
# Group E occupancy (K-8 school), Baltimore, MD
# Based on IBC 2021 egress chapters, NFPA 101, Maryland Building Performance Standards

meta:
  jurisdiction: "Baltimore, Maryland"
  occupancy_group: "E"
  occupancy_description: "Educational (K-8 school)"
  construction_type: "Type II-B"
  sprinklered: true
  project_type: "new construction"

# Jurisdiction — what the skill must identify
required_jurisdiction:
  building_code:
    name: "International Building Code"
    edition: 2021
    state_adoption: "Maryland Building Performance Standards (COMAR 09.12.01)"
  fire_code:
    name: "International Fire Code"
    edition: 2021
  referenced_standards:
    - "NFPA 101 Life Safety Code"
    - "NFPA 13 Standard for Installation of Sprinkler Systems"
  keywords_any:
    # Scorer checks jurisdiction.yaml for any of these
    - "IBC 2021"
    - "IBC 2018"  # Maryland may lag one cycle — accept either
    - "Maryland"
    - "COMAR"
    - "NFPA 101"

# Required research topics — the skill must include these in the outline
required_topics:
  - slug: occupant-load
    title: "Occupant Load Calculation"
    keywords: ["Table 1004.5", "occupant load", "20 SF/person", "classroom"]

  - slug: exits-required
    title: "Number of Exits Required"
    keywords: ["Table 1006.3.1", "exits required", "two exits"]

  - slug: exit-width
    title: "Exit and Corridor Width"
    keywords: ["1005.1", "exit width", "0.3 inches", "44 inches", "corridor"]

  - slug: travel-distance
    title: "Travel Distance to Exits"
    keywords: ["Table 1017.2", "travel distance", "250"]

  - slug: corridor-rating
    title: "Corridor Fire-Resistance Rating"
    keywords: ["Table 1020.1", "corridor", "fire-resistance", "1 hour", "0 hour"]

  - slug: dead-end-corridors
    title: "Dead-End Corridor Limits"
    keywords: ["1020.4", "dead-end", "20 feet"]

# Optional topics — credit if present, no penalty if absent
optional_topics:
  - slug: common-path
    title: "Common Path of Egress Travel"
    keywords: ["1006.2.1", "common path", "75 feet"]

  - slug: exit-separation
    title: "Exit Separation Distance"
    keywords: ["1007.1.1", "diagonal", "separation"]

  - slug: panic-hardware
    title: "Panic Hardware Requirements"
    keywords: ["panic", "hardware", "Group E", "50 occupants"]

  - slug: stair-requirements
    title: "Stairway Design Requirements"
    keywords: ["stair", "riser", "tread", "handrail"]

  - slug: door-requirements
    title: "Door Width and Swing Direction"
    keywords: ["door", "32 inches", "swing", "direction of egress"]

  - slug: illumination-signage
    title: "Exit Illumination and Signage"
    keywords: ["exit sign", "illumination", "1013", "1008"]

# Framing violations — these terms must NOT appear in the report
framing_violations:
  forbidden_terms:
    - "compliant"
    - "non-compliant"
    - "noncompliant"
    - "passes"
    - "fails"
    - "violation"
    - "in violation"
    - "code violation"

# Code citation references — score accuracy of section numbers
expected_citations:
  - code: "IBC"
    section: "Table 1004.5"
    topic: "occupant-load"

  - code: "IBC"
    section: "Table 1006.3.1"
    topic: "exits-required"

  - code: "IBC"
    section: "1005.1"
    topic: "exit-width"

  - code: "IBC"
    section: "Table 1017.2"
    topic: "travel-distance"

  - code: "IBC"
    section: "Table 1020.1"
    topic: "corridor-rating"

  - code: "IBC"
    section: "1020.4"
    topic: "dead-end-corridors"

# Gap analysis expectations
# The scorer checks whether gaps are classified with severity + confidence
gap_classification:
  required_fields:
    - "severity"    # HIGH, MEDIUM, LOW
    - "confidence"  # confirmed, needs_review, uncertain
  severity_values: ["HIGH", "MEDIUM", "LOW"]
  confidence_values: ["confirmed", "needs_review", "uncertain"]

# Pass 1 expectations — scorer checks that project docs were read
pass1_expectations:
  documents_should_be_read:
    - "A-1.1"
    - "01 10 00"
  inventory_should_exist: true
