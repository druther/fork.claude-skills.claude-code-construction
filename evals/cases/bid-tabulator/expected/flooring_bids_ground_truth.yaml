# =============================================================================
# SECONDARY – Gap analysis: incorrect / missing items per bid
# Flags use severity levels:
#   CRITICAL  = spec section entirely missing; not comparable without separate bid
#   HIGH      = individual required line items missing; affects apples-to-apples comparison
#   MEDIUM    = item present but scope is materially incomplete (e.g., rough only vs. complete)
#   LOW       = format/transparency issue; data extractable but ambiguous
#   INFO      = anomaly worth noting; does not affect completeness
# =============================================================================
gap_analysis:

  bid_01:
    complete: true
    total_spec_sections_priced: 6
    missing_spec_sections: []
    flags:
      - severity: LOW
        item: "LI-09 Gymnasium Poly Finish"
        detail: >
          Polyurethane finish system not broken out as a separate line item.
          Bundled into gymnasium SF rate ($23.45/SF). Cannot independently verify
          finish cost or use for change order pricing without a unit clarification.
        spec_ref: "09 64 66 Sec 3.2-C"
      - severity: INFO
        item: "Bid validity"
        detail: "60 days from March 21, 2026 = expires May 20, 2026."

  bid_02:
    complete: true
    total_spec_sections_priced: 6
    missing_spec_sections: []
    flags:
      - severity: LOW
        item: "Section lump-sum format"
        detail: >
          All spec sections priced as lump sums rather than individual line items.
          Unit costs provided in reference table but not linked to section subtotals.
          Verification of quantities requires cross-referencing reference table against
          section lump sums. No discrepancy found when calculated, but format reduces
          auditability.
      - severity: INFO
        item: "Rounding"
        detail: "Carpet tile extended ($85,957.50) includes cents – minor format anomaly."

  bid_03:
    complete: false
    total_spec_sections_priced: 5
    missing_spec_sections:
      - "09 64 66"
    flags:
      - severity: CRITICAL
        item: "09 64 66 – Wood Athletic Flooring"
        detail: >
          Section 09 64 66 ENTIRELY EXCLUDED. Missing scope includes:
          Gymnasium wood floor system (8,400 SF, complete DIN-certified system),
          Stage wood floor (1,200 SF),
          Polyurethane finish system (1 LS),
          Game line painting and logo (1 LS),
          Ventilating rubber cove base (560 LF).
          Estimated missing value (using Bid 01 rates): ~$234,810.
          Bid is not comparable to complete bids without a separate gym floor sub-bid.
        spec_ref: "09 64 66"
        missing_line_item_ids: [LI-07, LI-08, LI-09, LI-10, LI-11]
        how_flagged: "Explicit bold warning box in bid document; should be caught by vision pass"

  bid_04:
    complete: false
    total_spec_sections_priced: 5
    missing_spec_sections:
      - "09 67 23"
    flags:
      - severity: CRITICAL
        item: "09 67 23 – Resinous Urethane Mortar Flooring"
        detail: >
          Section 09 67 23 EXCLUDED. Exclusion is NOT in the exclusions section.
          It is buried as item #7 of 11 in the Clarifications & Qualifications text block:
          "Eastern Shore Interiors does not hold a current urethane mortar resinous flooring
          applicator certification. Section 09 67 23 Resinous Flooring is excluded from
          this proposal and must be bid separately by a Stonhard-certified contractor."
          Missing scope: kitchen complex resinous flooring (4,200 SF + 6" cove base).
          Estimated missing value (using Bid 01 rate): ~$68,250.
          This is the hardest exclusion to detect programmatically – requires reading
          a numbered qualification paragraph, not scanning a structured exclusions list.
        spec_ref: "09 67 23"
        missing_line_item_ids: [LI-16]
        how_flagged: "Text-buried in qualification #7; NOT in exclusions list; vision/NLP required"
      - severity: INFO
        item: "Gym poly finish"
        detail: "Polyurethane finish bundled into gym SF rate; not separately broken out."

  bid_05:
    complete: false
    total_spec_sections_priced: 5
    missing_spec_sections:
      - "09 68 13"
    flags:
      - severity: CRITICAL
        item: "09 68 13 – Tile Carpeting"
        detail: >
          Section 09 68 13 ENTIRELY ABSENT. Carpet tile is not priced, not listed in
          inclusions, not listed in exclusions, and not mentioned anywhere in the document.
          This is a silent omission – the hardest type to flag automatically.
          Missing scope: 7,850 SF carpet tile in offices, planning rooms, media center
          (CPT-coded rooms per finish schedule).
          Estimated missing value: ~$84,000–$92,000 (using range from other bids).
          Spec section 09 68 13 is listed in the opening "spec sections reviewed" statement,
          but never appears in the pricing table or inclusions.
        spec_ref: "09 68 13"
        missing_line_item_ids: [LI-17]
        how_flagged: "Completely silent – requires cross-referencing spec sections stated vs. sections priced"
      - severity: LOW
        item: "Stage + Game Lines combined"
        detail: "Stage floor ($1,200 SF × $21.50) and game lines lump sum ($7,100) combined into one line item. Deconstructable but ambiguous."
      - severity: LOW
        item: "Rubber tile + stair treads combined"
        detail: "Rubber tile SF and stair treads EA combined into one line item ($16,023). Two separate spec items with different units merged."

  bid_06:
    complete: false
    total_spec_sections_priced: 6
    missing_spec_sections: []
    note: "All 6 spec sections nominally represented, but 3 individual required line items are absent"
    flags:
      - severity: HIGH
        item: "LI-04 – Waterproofing/Crack Isolation Membrane (09 30 00)"
        detail: >
          Floor tile waterproofing membrane (ANSI A118.10, Mapelastic HPG) is NOT priced,
          NOT listed in inclusions, and NOT listed in exclusions.
          This is required under ALL ceramic tile floors per Spec 09 30 00 Sec 3.4 (MANDATORY).
          Bid prices ceramic floor tile and backer board but omits the mandatory membrane.
          Missing qty: 9,200 SF. Estimated missing value: ~$30,360–$32,660.
          Most difficult gap to detect in this bid because tile floor scope is otherwise present.
        spec_ref: "09 30 00 Sec 3.4 / TCA Method F122"
        missing_line_item_ids: [LI-04]
        how_flagged: "Must compare line items against mandatory spec requirements; silent omission within a partially-covered section"

      - severity: HIGH
        item: "LI-14 – Rubber Stair Treads (09 65 00)"
        detail: >
          Rubber stair treads (combined tread/riser, FS RR-T-650) are NOT priced and
          NOT mentioned anywhere. Rubber tile at landings IS priced.
          Missing qty: 108 EA. Estimated missing value: ~$9,500–$11,100.
        spec_ref: "09 65 00 Sec 2.2"
        missing_line_item_ids: [LI-14]
        how_flagged: "Rubber tile (landings) is present; stair treads are distinct scope item absent from document"

      - severity: HIGH
        item: "LI-11 – Ventilating Rubber Cove Base – Gymnasium (09 64 66)"
        detail: >
          Ventilating cove base at gymnasium perimeter is NOT priced and NOT mentioned.
          Standard resilient cove base is NOT a substitute – gymnasium requires ventilating
          type (Vent-Cove) to allow moisture movement per spec 09 64 66 Sec 2.3-C.
          Missing qty: 560 LF. Estimated missing value: ~$4,400–$4,900.
        spec_ref: "09 64 66 Sec 2.3-C / 3.2-B"
        missing_line_item_ids: [LI-11]
        how_flagged: "Gymnasium wood floor IS priced but its associated ventilating base is absent; requires sub-item cross-check"

      - severity: INFO
        item: "Informal document format"
        detail: "No per-line spec section references. Items described in plain language only. Requires fuzzy matching to spec sections."

  bid_07:
    complete: true
    total_spec_sections_priced: 6
    missing_spec_sections: []
    flags:
      - severity: INFO
        item: "Gymnasium poly finish broken out"
        detail: >
          Only bid to explicitly break out gymnasium finish as a separate LS ($18,500).
          Rough installation ($18.90/SF) + finish LS is most transparent format.
          When building comparison table, gymnasium total should be computed as:
          (8,400 × $18.90) + $18,500 = $176,180 for floor+finish
          (vs. other bids that bundle finish into SF rate).
      - severity: INFO
        item: "VE alternates provided"
        detail: >
          Four value engineering deducts provided: VE-1 ($14,200 deduct / Aacer sub),
          VE-2 ($8,700 deduct / Upofloor BBT sub), VE-3 ($3,900 deduct / 2-coat gym finish),
          VE-4 ($5,200 deduct / Crossville tile sub). Total potential deduct: $32,000.
          If any alternate is accepted, adjusted total should be updated in tabulation.

  bid_08:
    complete: false
    total_spec_sections_priced: 6
    missing_spec_sections: []
    note: >
      All 6 spec sections nominally referenced, but two major scope elements are explicitly
      excluded via warning box. Total is NOT comparable to other bids without addback.
    flags:
      - severity: CRITICAL
        item: "09 30 00 – Glazed Wall Tile (LI-03)"
        detail: >
          All glazed wall tile (CT-coded walls) is EXPLICITLY EXCLUDED.
          Diamond State does not perform wall tile installation.
          Missing qty: 21,400 SF. Estimated missing value: ~$267,000–$282,000
          (based on rates from other bids).
          To make this bid comparable, GC must obtain a separate tile subcontractor
          for all wall tile scope.
        spec_ref: "09 30 00 Sec 2.1-A / 3.7"
        missing_line_item_ids: [LI-03]
        how_flagged: "Explicit exclusion statement in warning box; floor tile IS priced; wall tile is not"

      - severity: CRITICAL
        item: "09 64 66 – Gymnasium Polyurethane Finish (LI-09)"
        detail: >
          Gymnasium sanding and 3-coat polyurethane finish system is EXPLICITLY EXCLUDED.
          Reflected in unit rate: $14.80/SF (rough only) vs. $18.90–$24.10/SF (complete)
          for other bidders. Missing scope: 1 LS finish system.
          Estimated missing value: $18,500 (per Bid 07 explicit LS rate).
        spec_ref: "09 64 66 Sec 3.2-C"
        missing_line_item_ids: [LI-09]
        how_flagged: "Explicit exclusion in warning box; unit rate significantly below market for complete system"

      - severity: CRITICAL
        item: "09 64 66 – Game Line Painting & Logo (LI-10)"
        detail: >
          Game line painting and center court logo are EXPLICITLY EXCLUDED.
          Missing scope: 1 LS. Estimated missing value: $6,450–$7,100.
        spec_ref: "09 64 66 Sec 3.2-C-4"
        missing_line_item_ids: [LI-10]
        how_flagged: "Explicit exclusion in warning box"

      - severity: INFO
        item: "Out-of-state contractor / MD registration"
        detail: >
          Diamond State Floor Systems is a Delaware contractor with MD registration
          described as 'pending.' GC should verify MD contractor license is active
          before award. May affect bonding and lien rights.

      - severity: INFO
        item: "Apples-to-oranges gym comparison"
        detail: >
          Gymnasium rough-only unit rate ($14.80/SF) must NOT be directly compared to
          complete-system rates from other bidders without adjustment.
          Adjusted comparable gym floor total for Bid 08 should include:
          $124,320 (rough) + ~$18,500 (finish, separate) + ~$6,750 (game lines, separate)
          = ~$149,570 comparable to Bid 07's explicit breakout of $183,930 for same scope.


