# -----------------------------------------------------------------------------
# MASTER SCOPE  –  every line item required by the contract documents
# Used as the reference checklist against which each bid is evaluated.
# -----------------------------------------------------------------------------
master_scope:
  quantities:
    conc_hardener_sf:   13800   # exposed concrete rooms (MECH, ELEC, storage)
    tile_floor_sf:       9200   # ceramic paver tile floors (PT rooms)
    tile_wall_sf:       21400   # glazed wall tile 4-1/4 sq (CT walls)
    waterproof_mem_sf:   9200   # crack-isolation membrane under ALL tile floors
    backer_board_sf:     7600   # cementitious backer board – wet/shower walls
    marble_threshold_ea:   92   # marble thresholds at tile doorways
    gym_wood_sf:         8400   # gymnasium wood athletic floor
    stage_wood_sf:       1200   # stage wood athletic floor
    gym_poly_finish_ls:     1   # gymnasium polyurethane finish (1 sealer + 2 coats)
    game_lines_ls:          1   # game line painting + center court logo
    vent_base_lf:         560   # ventilating rubber cove base – gymnasium
    bbt_sf:             52400   # bio-based tile (classrooms, corridors, offices)
    rubber_tile_sf:       580   # rubber tile – stair landings
    stair_treads_ea:      108   # rubber stair treads (combined tread/riser)
    resilient_base_lf:  14600   # resilient rubber base 4" cove
    resinous_sf:         4200   # urethane mortar flooring – kitchen complex
    carpet_tile_sf:      7850   # carpet tile – offices, planning, media center

  required_line_items:
    - id: LI-01
      spec_section: "03 35 13"
      description: "Concrete Chemical Hardener/Sealer – Exposed Interior Slabs"
      scope_note: "Applied to all interior slabs NOT receiving a subsequent finish coating per finish schedule. Rooms coded CONC."
      unit: SF
      qty: 13800
      spec_requirements:
        - "Chemically reactive waterborne inorganic siliconate"
        - "VOC content not to exceed 200 g/L"
        - "Comply with ACI 301"

    - id: LI-02
      spec_section: "09 30 00"
      description: "Ceramic Paver Tile – Floor"
      scope_note: "All PT-coded rooms per finish schedule. 12\" sq matte glazed over waterproofing membrane."
      unit: SF
      qty: 9200
      spec_requirements:
        - "ANSI A137.1; 12\" sq; 5/16\" thick; matte glazed"
        - "Moisture absorption 0–0.5%"
        - "Latex-Portland cement mortar bond coat (ANSI A118.4 or A118.15)"
        - "Polymer-modified grout (ANSI A118.7)"
        - "Waterproofing/crack isolation membrane required full coverage under ALL tile floors"

    - id: LI-03
      spec_section: "09 30 00"
      description: "Glazed Wall Tile – 4-1/4\" Square Semi-Gloss"
      scope_note: "All CT-coded walls per finish schedule (toilet rooms, locker rooms, shower areas)."
      unit: SF
      qty: 21400
      spec_requirements:
        - "ANSI A137.1; 4-1/4\" sq; semi-gloss; cushioned edges"
        - "Moisture absorption 3.0–7.0%"
        - "Thin-set installation per TCNA W244 over backer board"
        - "Polymer-modified grout"

    - id: LI-04
      spec_section: "09 30 00"
      description: "Waterproofing & Crack Isolation Membrane – Tile Floors"
      scope_note: "MANDATORY under ALL ceramic tile floor areas per Spec 09 30 00 Sec 3.4. NOT optional."
      unit: SF
      qty: 9200
      spec_requirements:
        - "Fluid-applied acrylic-based membrane with reinforcing mesh"
        - "ANSI A118.10 compliant"
        - "Basis-of-Design: Mapelastic HPG with fiberglass mesh"
        - "Full coverage TCA Method F122"

    - id: LI-05
      spec_section: "09 30 00"
      description: "Cementitious Backer Board – Wet Walls"
      scope_note: "All shower walls and high-humidity areas. Durock 1/2\" or equal."
      unit: SF
      qty: 7600
      spec_requirements:
        - "ANSI A118.9 compliant; 1/2\" thick"
        - "Durock by USG or Fiberock Aqua-Tough (contractor option for non-wet walls)"
        - "2\" coated glass fiber tape at joints; skim coat of setting material"

    - id: LI-06
      spec_section: "09 30 00"
      description: "Marble Thresholds – Gray Honed"
      scope_note: "At all doorways where tile terminates. 5\" wide × 5/8\" thick, beveled one long edge."
      unit: EA
      qty: 92
      spec_requirements:
        - "Marble; gray; honed finish; 5\" wide × full wall/frame width"
        - "5/8\" thick; beveled long edge; radiused corners"
        - "No holes, cracks, or open seams"

    - id: LI-07
      spec_section: "09 64 66"
      description: "Wood Athletic Flooring – Gymnasium (Complete System)"
      scope_note: "Full system: vapor retarder, neoprene isolation pads, sleepers, plywood subfloor, maple strip."
      unit: SF
      qty: 8400
      spec_requirements:
        - "DIN 18032-2 certified system (all 6 criteria)"
        - "Basis-of-Design: Robbins Sports Surfaces Air Channel Star or equal"
        - "33/32\" White Hard Maple; Grade 2 & Better; MC 7–9%"
        - "Vapor retarder: 6 mil polyethylene"
        - "Resilient pads: 4\"×4\" neoprene, 24\" o.c."
        - "Sleepers: nominal 2\"×3\" spruce"
        - "Subfloor: 15/32\" Fir or Southern Pine plywood (no added urea formaldehyde)"
        - "FSC-certified wood or FSC Controlled Wood"

    - id: LI-08
      spec_section: "09 64 66"
      description: "Wood Athletic Flooring – Stage"
      scope_note: "25/32\" Hard Maple over tempered hardboard (ANSI 135.4, 0.205\" thick)."
      unit: SF
      qty: 1200
      spec_requirements:
        - "25/32\" White Hard Maple; Grade 2 & Better"
        - "Over tempered hardboard substrate"
        - "FSC-certified wood"

    - id: LI-09
      spec_section: "09 64 66"
      description: "Gymnasium Polyurethane Finish System"
      scope_note: "Separate from rough installation. Mandatory 3-coat system per spec."
      unit: LS
      qty: 1
      spec_requirements:
        - "Oil-modified polyurethane"
        - "1 sealer coat + 2 finish coats (3 total)"
        - "Sand between coats with steel wool; vacuum clean"
        - "Tack cloth final wipe before each coat"

    - id: LI-10
      spec_section: "09 64 66"
      description: "Game Line Painting & Center Court Logo"
      scope_note: "Per drawings. Chalk layout required; Architect and Owner approval BEFORE painting."
      unit: LS
      qty: 1
      spec_requirements:
        - "2\" wide colored game lines per current association rules"
        - "Layout in chalk; written Architect/Owner approval required before proceeding"
        - "Main court lines run continuously"
        - "Gameline and logo paint compatible with polyurethane finish"
        - "Applied between finish coats (not under final coat)"

    - id: LI-11
      spec_section: "09 64 66"
      description: "Ventilating Rubber Cove Base – Gymnasium"
      scope_note: "Covers expansion gap at perimeter. NOT standard cove base."
      unit: LF
      qty: 560
      spec_requirements:
        - "Molded rubber; 4\" high; 3\" toe; ventilating type"
        - "Basis-of-Design: Vent-Cove by Johnsonite"
        - "Pre-molded outside corners; mitered inside corners"
        - "Anchored to wall with manufacturer's screws and anchors"

    - id: LI-12
      spec_section: "09 65 00"
      description: "Bio-Based Tile (BBT) – Classrooms, Corridors, Offices"
      scope_note: "All BBT-coded rooms per finish schedule. Armstrong Migrations/Striations or equal."
      unit: SF
      qty: 52400
      spec_requirements:
        - "Polyester resin binder; ASTM F2982 compliant"
        - "12\"×12\" × 0.125\" thick"
        - "CRF min 0.45 W/sq cm (ASTM E648)"
        - "Up to 12 colors (75% standard, 25% premium)"
        - "CRI Green Label certified adhesive"
        - "Patterns per ceiling plan coordination (curved bulkheads)"

    - id: LI-13
      spec_section: "09 65 00"
      description: "Rubber Tile – Stair Landings"
      scope_note: "All RBR-coded stair landing areas per finish schedule."
      unit: SF
      qty: 580
      spec_requirements:
        - "Homogeneous; ASTM F1344"
        - "24\"×24\" × 0.080\" thick; smooth"
        - "CRF min 0.45 W/sq cm"

    - id: LI-14
      spec_section: "09 65 00"
      description: "Rubber Stair Treads – Combined Tread/Riser"
      scope_note: "All stairs receiving RBR finish per finish schedule."
      unit: EA
      qty: 108
      spec_requirements:
        - "Rubber; FS RR-T-650 compliant"
        - "Full width and depth in one piece; tapered thickness"
        - "Nosing: square; min 1-5/8\" deep"
        - "Style: combined tread and riser; hammered texture"
        - "Contrasting color abrasive grit strips full width at nosing"

    - id: LI-15
      spec_section: "09 65 00"
      description: "Resilient Rubber Base 4\" Cove"
      scope_note: "All RST-coded rooms per finish schedule."
      unit: LF
      qty: 14600
      spec_requirements:
        - "ASTM F1861 Type TS (rubber, vulcanized thermoset)"
        - "Style B Cove; top set; 4\" height; 0.125\" thick"
        - "Satin finish; roll stock"
        - "Min 18\" between joints; mitered internals; V-cut externals"

    - id: LI-16
      spec_section: "09 67 23"
      description: "Resinous Urethane Mortar Flooring – Kitchen Complex"
      scope_note: "Rooms 1411–1419, 1608 (EPOXY/FRP per finish schedule)."
      unit: SF
      qty: 4200
      spec_requirements:
        - "Basis-of-Design: Stonhard Stonclad UT (urethane mortar)"
        - "Nominal 1/4\" thick; light texture wearing surface"
        - "Shot-blast substrate preparation (apparatus type)"
        - "1/4\" body coat + Stonclad UT sealer topcoat"
        - "6\" integral cove base (Stonclad UR mortar)"
        - "Metal cove caps at top of all cove base"
        - "Stonflex MP7 joint fill material at control joints"
        - "CT5 concrete crack treatment as required"
        - "Moisture: RH probe ≤85% (ASTM F2170) AND Ca-Cl ≤7 lb/1000SF/24hr (ASTM F1869)"
        - "Installer must be manufacturer-certified"
        - "Pre-installation conference min 30 days before start"
        - "48\"×48\" mockup required; Architect + Owner sign-off on texture before production"

    - id: LI-17
      spec_section: "09 68 13"
      description: "Carpet Tile – Fully Adhered"
      scope_note: "All CPT-coded rooms per finish schedule."
      unit: SF
      qty: 7850
      spec_requirements:
        - "Basis-of-Design: Interface Quizbowl (or equal)"
        - "Tufted textured loop; 20\"×20\" tile; GlasBac RE primary backing"
        - "One color dye lot; up to 4 colors"
        - "CRF min 0.22 W/sq cm (ASTM E648)"
        - "Pass ASTM D2859 (pill test)"
        - "Max electrostatic charge 3.5 kV at 20% RH"
        - "CRI Green Label Plus certified"
        - "CRI Green Label certified adhesive; max VOC 50 g/L"
        - "Pile direction parallel to adjacent tiles; square pattern"
        - "5% attic stock (min 1 full box per type/color)"

  universal_inclusions:
    - "All labor, materials, equipment, tools, and supervision"
    - "Substrate moisture testing (calcium chloride method for resilient/resinous areas)"
    - "pH testing of concrete substrate prior to resilient and resinous installation"
    - "Substrate patching and leveling with latex-modified cementitious filler"
    - "Coordination with GC for gymnasium slab depression depth prior to concrete pour"
    - "60-day concrete cure verification before wood floor installation"
    - "VOC-compliant adhesives per Section 01 61 16 throughout"
    - "LEED submittals: FSC chain-of-custody (maple), VOC content, recycled content, regional materials"
    - "Pre-installation conference attendance per all specification sections"
    - "Extra/attic stock: 5% resilient tile; 5% carpet tile; 2% ceramic tile"
    - "Protection of installed work through Substantial Completion"
    - "Cleaning of all installed surfaces per manufacturer's instructions"

  universal_exclusions:
    - "Walk-in cooler flooring Room 1415 – see specifications"
    - "Walk-in freezer flooring Room 1416 – see specifications"
    - "Temporary heat, power, or dehumidification to achieve specification conditions"
    - "Structural concrete slab repair (crack injection, leveling topping)"
    - "Sales tax on materials (Baltimore City Public Schools – government exempt)"


