# =============================================================================
# GROUND TRUTH: SUBCONTRACT WRITER SKILL
# Project:  Holabird Elementary / Middle School
# Owner:    Baltimore City Public Schools
# Arch/Eng: Grimm + Parker Architects  |  Project No. GP#21553
# Prime GC: Barton Malow Company  (SC No. BM-21553-FLR-01)
# Subcontractor: Premier Flooring Solutions, LLC  (Bid 01 – awarded)
# Scope:    Flooring, Tiling & Concrete Floor Finishing
# Spec Sections: 03 35 13 / 09 30 00 / 09 64 66 / 09 65 00 / 09 67 23 / 09 68 13
# =============================================================================
#
# HOW THIS FILE IS USED
# ---------------------
# primary:   complete required structure and field values the generated contract must contain
# secondary: validation rules the skill's output must satisfy
#
# FIELD VALUE CONVENTIONS
# -----------------------
# "[VARIABLE]"          = value derived from the specific sub being contracted; must be filled
# "[FROM_BID]"          = value extracted from the awarded subcontractor's bid document
# "[FROM_PRIME]"        = value that must flow down from the prime contract
# "[PER_SPEC <section>]"= value mandated by the specification; not negotiable
# REQUIRED              = field must be present; empty or missing = FAIL
# CONDITIONAL           = required only when trigger condition is true
# =============================================================================

meta:
  purpose: "Ground truth for subcontract-writer skill eval – flooring scope"
  scope_tag: "FLOORING_TILING_CONCRETE"
  reference_example: "Example_Subcontract_BM_21553_FLR.pdf"
  applicable_spec_sections:
    - "03 35 13"
    - "09 30 00"
    - "09 64 66"
    - "09 65 00"
    - "09 67 23"
    - "09 68 13"
  project_type: "public_school"
  jurisdiction: "Maryland / Baltimore City"


# =============================================================================
# PRIMARY – Document structure and required content
# =============================================================================

document_structure:
  format: "Word (.docx)"
  page_size: "US Letter (8.5\" × 11\")"
  margins: "1 inch all sides"
  font: "Arial or Times New Roman, 10–12pt body"
  required_sections_ordered:
    - cover_page
    - article_1_subcontract_documents
    - article_2_scope_of_work
    - article_3_schedule
    - article_4_contract_sum
    - article_5_progress_payments
    - article_6_changes
    - article_7_insurance_and_bonds
    - article_8_submittals
    - article_9_labor_requirements
    - article_10_indemnification
    - article_11_warranty
    - article_12_safety
    - article_13_default_termination
    - article_14_dispute_resolution
    - article_15_general_provisions
    - signature_block
    - exhibits_list


# =============================================================================
# COVER PAGE
# =============================================================================
cover_page:
  status: REQUIRED
  required_fields:
    document_title:
      value: "SUBCONTRACT AGREEMENT"
      requirement: REQUIRED
    subtitle:
      value: "FOR FLOORING, TILING & CONCRETE FLOOR FINISHING"
      requirement: REQUIRED
      note: "Must reflect actual scope; generic 'Subcontract Agreement' alone is insufficient"

    subcontract_number:
      value: "[VARIABLE – GC assigns]"
      example: "BM-21553-FLR-01"
      format: "[GC prefix]-[project no]-[scope code]-[sequence]"
      requirement: REQUIRED

    project:
      value: "Holabird Elementary / Middle School"
      requirement: REQUIRED

    owner:
      value: "Baltimore City Public Schools"
      requirement: REQUIRED

    project_address:
      value: "4200 Sinclair Lane, Baltimore, MD 21213"
      requirement: REQUIRED

    architect:
      value: "Grimm + Parker Architects"
      project_number: "GP#21553"
      requirement: REQUIRED

    prime_contract_number:
      value: "[FROM_PRIME]"
      requirement: REQUIRED

    contractor:
      legal_name: "[VARIABLE – GC legal entity name]"
      address: "[VARIABLE]"
      requirement: REQUIRED

    subcontractor:
      legal_name: "[FROM_BID – exact legal name per bid submission]"
      address: "[FROM_BID]"
      license_number: "[FROM_BID – state contractor license]"
      requirement: REQUIRED

    date_of_agreement:
      value: "[VARIABLE – execution date]"
      format: "Month DD, YYYY"
      requirement: REQUIRED

    contract_sum:
      value: "[FROM_BID – awarded lump sum]"
      format: "$ amount in numerals AND written words"
      example: "$1,445,646.00 (One Million Four Hundred Forty-Five Thousand Six Hundred Forty-Six Dollars)"
      requirement: REQUIRED

    signature_block_on_cover:
      status: REQUIRED
      parties:
        - "Contractor (name + title + signature line + date)"
        - "Subcontractor (name + title + signature line + date)"
      note: "Cover signatures are execution block; full notarization block may be in Article 15"


# =============================================================================
# ARTICLE 1 – SUBCONTRACT DOCUMENTS
# =============================================================================
article_1_subcontract_documents:
  status: REQUIRED
  required_content:
    document_hierarchy:
      requirement: REQUIRED
      must_include:
        - "This Agreement"
        - "Prime Contract (identified by number and date)"
        - "General Conditions of the Prime Contract"
        - "Supplementary / Special Conditions"
        - "Contract Drawings (referenced by Architect, project number, date)"
        - "Project Specifications (referenced by Architect, project number, date)"
        - "All Addenda (numbered; issued through bid date)"
        - "Modifications issued after execution"

    precedence_clause:
      requirement: REQUIRED
      content: >
        In event of conflict, order of precedence must be stated. Standard order:
        (1) Agreement, (2) Modifications, (3) Prime Contract General Conditions,
        (4) Specifications, (5) Drawings.

    applicable_spec_sections:
      requirement: REQUIRED
      minimum_listed:
        - "03 35 13 – Concrete Floor Finishing"
        - "09 30 00 – Tiling"
        - "09 64 66 – Wood Athletic Flooring"
        - "09 65 00 – Resilient Flooring"
        - "09 67 23 – Resinous Flooring"
        - "09 68 13 – Tile Carpeting"
      also_required:
        - "All Division 01 sections applicable to Subcontractor's Work (01 30 00, 01 35 14–16, 01 40 00, 01 60 00, 01 61 16)"

    prime_contract_flow_down:
      requirement: REQUIRED
      content: "Subcontractor is bound to Contractor to the same extent Contractor is bound to Owner"


# =============================================================================
# ARTICLE 2 – SCOPE OF WORK
# =============================================================================
article_2_scope_of_work:
  status: REQUIRED

  scope_description:
    requirement: REQUIRED
    preamble: >
      "Furnish all labor, materials, equipment, tools, supervision, and incidentals
      necessary to complete the following Work in strict accordance with the Subcontract Documents"
    must_reference_spec_sections: true

  scope_line_items:
    requirement: REQUIRED
    note: "Each spec section must be individually described with quantities"
    items:
      - spec: "03 35 13"
        label: "Concrete Floor Finishing"
        required_content:
          - "Chemical hardener/sealer type (siliconate; chemically reactive; waterborne)"
          - "Applicable rooms: CONC-coded per finish schedule"
          - "Area quantity: approximately 13,800 SF"
          - "Standard: ACI 301 compliant"
          - "VOC limit: not to exceed 200 g/L per spec"

      - spec: "09 30 00"
        label: "Tiling"
        required_content:
          - "Ceramic paver tile floors: 12\" sq matte glazed, ~9,200 SF"
          - "Glazed wall tile: 4-1/4\" semi-gloss, ~21,400 SF"
          - "Waterproofing/crack isolation membrane: Mapelastic HPG or equal; ANSI A118.10; ~9,200 SF; FULL COVERAGE under all tile floors"
          - "Cementitious backer board: Durock 1/2\" or equal; wet walls; ~7,600 SF"
          - "Marble thresholds: 5\" × 5/8\" gray honed; beveled edge; ~92 EA"
          - "All setting materials, polymer-modified grout, trim, accessories"
          - "Reference: all PT and CT-coded rooms per finish schedule"
        critical_note: >
          Waterproofing membrane MUST be explicitly called out as a separate scope item.
          Omission of membrane from scope description is a CRITICAL gap (see bid_06 gap analysis).

      - spec: "09 64 66"
        label: "Wood Athletic Flooring"
        required_content:
          - "Gymnasium: DIN 18032-2 certified complete system; basis-of-design Robbins Air Channel Star or equal"
          - "Gymnasium components: 6 mil polyethylene vapor retarder, 4\"×4\" neoprene isolation pads @ 24\" o.c., nominal 2×3 spruce sleepers, 15/32\" Fir/SP plywood subfloor (no urea formaldehyde)"
          - "Gymnasium flooring: 33/32\" White Hard Maple; Grade 2 & Better; MC 7–9%; ~8,400 SF"
          - "Stage flooring: 25/32\" White Hard Maple over tempered hardboard (ANSI 135.4); ~1,200 SF"
          - "Polyurethane finish system: oil-modified; 1 sealer coat + 2 finish coats (3 total)"
          - "Game line painting: per drawings; chalk layout approval by Architect/Owner required before painting"
          - "Center court logo: per drawings"
          - "Ventilating rubber cove base at gymnasium perimeter: Vent-Cove by Johnsonite; 4\" high; ~560 LF"
          - "FSC-certified wood or FSC Controlled Wood required per spec"
        critical_note: >
          Polyurethane finish system and game lines MUST be separately identifiable in scope.
          Ventilating base (not standard cove base) MUST be explicitly listed.
          These are separate from the rough floor installation and must not be silently bundled.

      - spec: "09 65 00"
        label: "Resilient Flooring"
        required_content:
          - "Bio-based tile: Armstrong Migrations/Striations or equal; 12\"×12\" × 0.125\"; ~52,400 SF; up to 12 colors (75% standard / 25% premium)"
          - "Rubber tile at stair landings: 24\"×24\" smooth; ASTM F1344; ~580 SF"
          - "Rubber stair treads: combined tread/riser; hammered texture; abrasive nosing strip; FS RR-T-650; ~108 EA"
          - "Resilient rubber base 4\" cove: ASTM F1861 Type TS; roll; satin; ~14,600 LF"
          - "CRI Green Label certified adhesive throughout"
          - "Reference: all BBT, RBR, RST coded rooms per finish schedule"
        critical_note: >
          Stair treads MUST be explicitly listed. They are distinct from rubber tile at landings.
          Both rubber tile (SF, at landings) and stair treads (EA, at stair nosings) must appear.

      - spec: "09 67 23"
        label: "Resinous Flooring"
        required_content:
          - "System: urethane mortar; basis-of-design Stonhard Stonclad UT or approved equal"
          - "Nominal thickness: 1/4\" (6.4 mm)"
          - "Wearing surface: light texture"
          - "Substrate preparation: shot-blast (apparatus type; contained; vacuum recirculation)"
          - "6\" integral cove base (Stonclad UR mortar)"
          - "Metal cove caps at top of all integral cove base"
          - "Topcoat sealer: Stonclad UT urethane sealer; one coat"
          - "Joint fill: Stonflex MP7 at control joints"
          - "Crack treatment: CT5 as required"
          - "Location: kitchen complex Rooms 1411-1419, 1608; ~4,200 SF"
          - "Installer must be manufacturer-certified in writing"
          - "Pre-installation conference required minimum 30 days before start"
          - "48\"×48\" mockup with Architect/Owner sign-off on texture required before production"
        critical_note: >
          Installer certification requirement MUST be in scope.
          Mockup requirement MUST be called out – it is a precondition to production.

      - spec: "09 68 13"
        label: "Tile Carpeting"
        required_content:
          - "Product: Interface Quizbowl or approved equal; tufted textured loop"
          - "Size: 20\"×20\" tile; GlasBac RE primary backing"
          - "Area: ~7,850 SF; up to 4 colors; one dye lot per color"
          - "Installation: fully adhered; CRI Green Label Plus certified product"
          - "Adhesive: CRI Green Label certified; max VOC 50 g/L"
          - "Pattern: square; pile direction parallel to adjacent tiles"
          - "Reference: all CPT-coded rooms per finish schedule"

  inclusions_list:
    requirement: REQUIRED
    must_include:
      - "All substrate moisture testing (calcium chloride per ASTM F1869; RH probe per ASTM F2170 for resinous areas)"
      - "pH testing of concrete substrates"
      - "Substrate patching and leveling with latex-modified cementitious filler"
      - "All VOC-compliant adhesives and coatings per Section 01 61 16"
      - "Coordination with Contractor for gymnasium slab depression prior to concrete placement"
      - "Verification of 60-day concrete cure before wood floor installation"
      - "Pre-installation conferences per each specification section"
      - "All LEED submittals: FSC chain-of-custody, VOC content data, recycled content, regional materials"
      - "48\"×48\" resinous flooring mockup; Architect and Owner sign-off required before production"
      - "Attic stock: 5% bio-based tile and carpet tile; 2% ceramic tile; minimum one full box per type/color"
      - "Protection of all installed work through Substantial Completion"
      - "Cleaning of all installed surfaces per each manufacturer's instructions"

  exclusions_list:
    requirement: REQUIRED
    must_include:
      - "Walk-in cooler flooring Room 1415 (see project specifications)"
      - "Walk-in freezer flooring Room 1416 (see project specifications)"
      - "Structural concrete slab repair, crack injection, or leveling topping slab"
      - "Temporary heat, power, or dehumidification equipment to achieve spec environmental conditions"
    optional_common:
      - "Ceramic tile for Walk-in Cooler/Freezer (if not bidding)"
      - "Any scope explicitly declined in Subcontractor's bid"


# =============================================================================
# ARTICLE 3 – SCHEDULE
# =============================================================================
article_3_schedule:
  status: REQUIRED
  required_content:
    commencement:
      requirement: REQUIRED
      content: "Work commences within [N] calendar days of written Notice to Proceed from Contractor"
      typical_value: "5 calendar days"

    substantial_completion_date:
      requirement: REQUIRED
      value: "[FROM_PRIME – aligned with project milestone schedule]"
      note: "Must state specific date or milestone, not just 'per schedule'"

    time_is_of_the_essence:
      requirement: REQUIRED
      value: true

    liquidated_damages_flow_down:
      requirement: REQUIRED
      content: >
        Subcontractor acknowledges LD provisions of Prime Contract and agrees LD flow down
        to the extent Subcontractor's acts/omissions caused the delay.
      ld_rate: "[FROM_PRIME]"
      example: "$1,500 per calendar day"

    gym_floor_concrete_cure:
      requirement: REQUIRED
      trigger: "09 64 66 in scope"
      content: "Gymnasium wood floor installation shall not commence until concrete has cured minimum 60 days and ambient conditions comply with Spec 09 64 66 §1.7"

    environmental_conditions:
      requirement: REQUIRED
      content: >
        Wood floor installation: ambient temperature 65–80°F, relative humidity 35–50%.
        Materials acclimation: minimum 72 hours on site before installation.

    milestone_schedule:
      requirement: CONDITIONAL
      trigger: "Project has phased occupancy or critical milestone dates"
      content: "List of key milestones with dates (gym floor, kitchen floor, tile completion)"


# =============================================================================
# ARTICLE 4 – CONTRACT SUM
# =============================================================================
article_4_contract_sum:
  status: REQUIRED
  required_content:
    contract_sum_statement:
      requirement: REQUIRED
      format:
        - "Dollar amount in numerals"
        - "Dollar amount in written words"
        - "Confirmation: lump sum inclusive of all labor, materials, equipment, overhead, profit"
        - "Confirmation: sales tax exempt (Baltimore City Public Schools government owner)"

    schedule_of_values:
      requirement: REQUIRED
      submission_deadline: "10 days from execution"
      form: "AIA G703 Continuation Sheet or equivalent"
      minimum_line_items:
        - spec: "03 35 13"
          description: "Concrete Hardener/Sealer"
          approx_value: "$25,530"
        - spec: "09 30 00"
          description: "Tiling (Floor Tile, Wall Tile, Membrane, Backer Board, Thresholds)"
          approx_value: "$474,026"
          note: "May be broken into sub-lines; membrane should be identifiable"
        - spec: "09 64 66"
          description: "Wood Athletic Flooring (Gym + Stage + Finish + Game Lines + Vent Base)"
          approx_value: "$234,210"
          note: "Finish and game lines must be individually identifiable for closeout purposes"
        - spec: "09 65 00"
          description: "Resilient Flooring (BBT + Rubber Tile + Stair Treads + Base)"
          approx_value: "$553,720"
        - spec: "09 67 23"
          description: "Resinous Flooring"
          approx_value: "$68,250"
        - spec: "09 68 13"
          description: "Carpet Tile"
          approx_value: "$87,920"
        - description: "General Conditions / Mobilization / Closeout"
          approx_value: "$2,000 – $5,000"
          requirement: CONDITIONAL

    unit_prices:
      requirement: REQUIRED
      purpose: "Used for change order valuation; listed in Exhibit A"
      minimum_items:
        - {item: "Concrete Hardener/Sealer", unit: SF}
        - {item: "Ceramic Paver Tile Floor (furnished & installed)", unit: SF}
        - {item: "Glazed Wall Tile (furnished & installed)", unit: SF}
        - {item: "Waterproofing/Crack Isolation Membrane", unit: SF}
        - {item: "Cementitious Backer Board", unit: SF}
        - {item: "Marble Threshold", unit: EA}
        - {item: "Bio-Based Tile (BBT) – furnished & installed", unit: SF}
        - {item: "Carpet Tile – furnished & installed", unit: SF}
        - {item: "Resinous Urethane Mortar Floor (complete system)", unit: SF}
        - {item: "Maple Athletic Flooring – Gymnasium (complete system)", unit: SF}
        - {item: "Resilient Rubber Base 4\"", unit: LF}
        - {item: "Rubber Stair Tread", unit: EA}


# =============================================================================
# ARTICLE 5 – PROGRESS PAYMENTS
# =============================================================================
article_5_progress_payments:
  status: REQUIRED
  required_content:
    application_for_payment:
      requirement: REQUIRED
      submission_date: "20th of each month (or [N] days before GC's Owner submission deadline)"
      form: "AIA G703 or equivalent, supported by Schedule of Values"
      required_backup:
        - "Certified payrolls (weekly, for all pay periods in billing period)"
        - "Conditional lien waiver for current billing period"
        - "Unconditional lien waiver for all prior periods"
        - "Stored material documentation if applicable"

    retainage:
      requirement: REQUIRED
      phase_1:
        rate: "10%"
        trigger: "Until 50% completion of Subcontract Work"
      phase_2:
        rate: "5%"
        trigger: "After 50% completion, provided: (a) Subcontractor not in default; (b) GC has obtained retainage reduction from Owner"
      public_project_note: >
        Maryland Code, State Finance and Procurement §17-628 limits retainage to 10%
        on public contracts. Retainage reduction to 5% at 50% is owner-dependent.

    payment_timing:
      requirement: REQUIRED
      mechanism: "pay-when-paid"
      backstop:
        requirement: REQUIRED
        content: >
          If Owner fails to pay Contractor within [N] days of due date, Contractor
          shall pay Subcontractor within [M] days of Application regardless of Owner
          payment status.
        typical_values:
          owner_non_payment_trigger: "60 days after due date"
          backstop_payment_deadline: "75 days from Subcontractor's Application"
        legal_note: >
          Maryland courts have upheld pay-when-paid with backstop as a timing mechanism
          (not a pay-if-paid risk shift). Pay-if-paid clauses (absolute condition) face
          enforceability risk under Maryland law.

    final_payment:
      requirement: REQUIRED
      conditions_all_must_be_met:
        - "Subcontractor's full completion including punch list"
        - "Submission of final unconditional lien waiver"
        - "Submission of all closeout documents (O&M manuals, warranties, as-builts, attic stock delivery)"
        - "Contractor's receipt of final payment from Owner attributable to Subcontractor's Work"
      timing: "Within 30 days of all conditions being satisfied"

    stored_materials:
      requirement: CONDITIONAL
      trigger: "Subcontractor requests payment for stored but uninstalled materials"
      content: >
        Payment for stored materials requires: (a) Owner approval; (b) materials stored
        on-site or in bonded warehouse; (c) proof of insurance naming Owner and Contractor;
        (d) bill of sale or title documentation.


# =============================================================================
# ARTICLE 6 – CHANGES IN THE WORK
# =============================================================================
article_6_changes:
  status: REQUIRED
  required_content:
    change_order_process:
      requirement: REQUIRED
      content: >
        No change valid unless authorized in writing before commencing changed work,
        except in emergency. Subcontractor must submit pricing within [N] days of
        written request.
      typical_notice: "10 days to price; 7 days to commence under direction to proceed"

    markup_rates:
      requirement: REQUIRED
      additive_changes:
        subcontractor_own_work:
          overhead: "10%"
          profit: "10%"
          combined_max: "20% on direct labor and material"
        lower_tier_subcontractor_work:
          markup: "10% max (5% OH + 5% profit)"
        equipment_rental: "10% on actual rental cost"
      deductive_changes:
        credit_requirement: "Full direct cost savings to Contractor; no overhead/profit retained on deleted work"
        standard: "Credit = direct cost savings + 5% admin fee to GC"

    unit_prices_for_changes:
      requirement: REQUIRED
      reference: "Exhibit A – Unit Price Schedule"
      applies_to: "Quantity adjustments for scope items listed in Schedule of Values"

    force_account:
      requirement: REQUIRED
      content: >
        For work directed on a time-and-material basis: Subcontractor shall keep
        daily records of labor, equipment, and materials; records subject to
        Contractor verification; markup as above.

    time_impact:
      requirement: REQUIRED
      content: >
        Subcontractor's right to additional time for changes must be asserted in
        writing within [N] days of the event giving rise to the claim.
      typical_notice: "10 days"


# =============================================================================
# ARTICLE 7 – INSURANCE AND BONDS
# =============================================================================
article_7_insurance_and_bonds:
  status: REQUIRED
  required_content:
    insurance_requirements:
      requirement: REQUIRED
      must_precede_work: true
      coverages:
        commercial_general_liability:
          requirement: REQUIRED
          occurrence_basis: true
          limits:
            each_occurrence: "$1,000,000"
            general_aggregate: "$2,000,000"
            products_completed_operations: "$2,000,000"
            personal_advertising_injury: "$1,000,000"
          additional_insured:
            requirement: REQUIRED
            parties:
              - "Contractor (GC)"
              - "Owner (Baltimore City Public Schools)"
              - "Architect (Grimm + Parker Architects)"
          products_completed_ops_maintained: "Minimum 2 years after Substantial Completion"

        automobile_liability:
          requirement: REQUIRED
          limits:
            combined_single_limit: "$1,000,000 per occurrence"
          coverage: "Owned, non-owned, and hired vehicles"

        workers_compensation:
          requirement: REQUIRED
          limits:
            statutory: "Maryland statutory limits"
            employers_liability: "$500,000 / $500,000 / $500,000"

        umbrella_excess:
          requirement: REQUIRED
          limits:
            per_occurrence: "$5,000,000"
            aggregate: "$5,000,000"
          following_form: "Over CGL, Auto, Employers Liability"

      certificate_requirements:
        requirement: REQUIRED
        content:
          - "Certificate of Insurance on ACORD 25 form"
          - "Additional insured endorsement (CG 20 10 + CG 20 37 or equivalent)"
          - "Waiver of subrogation in favor of Owner and Contractor"
          - "30-day cancellation notice (10-day for non-payment)"
          - "Submitted before commencing Work and at each renewal"

    performance_and_payment_bond:
      requirement: REQUIRED
      trigger: "Public works project; contract sum > $100,000 (Maryland Public Works threshold)"
      amount: "100% of Contract Sum each (Performance Bond + Payment Bond)"
      form: "AIA A312 Performance Bond and Payment Bond"
      submission_deadline: "10 days from execution of Agreement"
      surety_requirements:
        - "Licensed in Maryland"
        - "Listed on U.S. Treasury Circular 570"
        - "A.M. Best rating of A- VII or better"
      bond_premium: "Included in Contract Sum (not a separate add)"


# =============================================================================
# ARTICLE 8 – SUBMITTALS
# =============================================================================
article_8_submittals:
  status: REQUIRED
  required_content:
    submittal_schedule:
      requirement: REQUIRED
      submission_deadline: "15 days from execution"
      must_include_all_spec_sections: true

    required_submittal_types:
      shop_drawings:
        requirement: REQUIRED
        items:
          - "Floor termination details and expansion joint details (09 64 66)"
          - "Game line layout and logo design (09 64 66)"
          - "Tile layout patterns, control joints, threshold locations (09 30 00)"
          - "Resinous flooring joint layout (09 67 23)"
          - "Carpet tile layout joints (09 68 13)"

      product_data:
        requirement: REQUIRED
        items:
          - "All flooring products (tile, wood, carpet, resinous, resilient)"
          - "All adhesives with VOC content in g/L"
          - "All setting materials (mortar, grout)"
          - "Polyurethane finish and game line paint"
          - "Waterproofing membrane"

      samples:
        requirement: REQUIRED
        items:
          - "Two samples each flooring material illustrating color, pattern, sheen"
          - "Two 12\"×12\" resilient tile samples per color selected"
          - "Two carpet tiles per color selected"
          - "Two samples ventilating base and resilient base (color)"
          - "Resinous flooring: 6\" square applied sample on rigid backing by installer"
          - "Tile samples on 18\"×18\" plywood panels with grout joint"

      leed_documentation:
        requirement: REQUIRED
        items:
          - "Chain-of-custody certificates for FSC-certified maple flooring (MR Credit 7)"
          - "VOC content in g/L for all adhesives, sealants, coatings (EQ Credits 4.1, 4.2)"
          - "VOC content for plywood subfloor (EQ Credit 4.4)"
          - "Recycled content percentages by weight for eligible products (MR Credits 4.1, 4.2)"
          - "Regional material data: location of manufacture and raw material extraction (MR Credit 5)"
          - "CRI Green Label Plus certification for carpet tile (EQ Credit 4.3)"

      installer_qualifications:
        requirement: REQUIRED
        items:
          - "References: minimum 5 years continuous experience under current company name (09 64 66)"
          - "MFMA membership/approval documentation for wood floor installer (09 64 66)"
          - "Manufacturer's written certification for resinous flooring installer (09 67 23)"
          - "Carpet installer certification: FCIB, IFCI, or CRI certified (09 68 13)"

      certifications:
        requirement: REQUIRED
        items:
          - "Written certification from manufacturer that products do not contain asbestos (09 65 00)"
          - "DIN 18032-2 compliance documentation for gymnasium floor system (09 64 66)"

      maintenance_data:
        requirement: REQUIRED
        submission_timing: "At closeout / prior to final payment"
        items:
          - "Three copies AMFMA Care and Preservation of Your Wood Floors (09 64 66)"
          - "Maintenance procedures for all resilient flooring products"
          - "Recommended cleaning schedule and materials for all flooring types"
          - "Resinous flooring maintenance manual"

    review_period:
      contractor_review: "10 business days"
      resubmittal_turnaround: "7 business days"


# =============================================================================
# ARTICLE 9 – LABOR REQUIREMENTS
# =============================================================================
article_9_labor_requirements:
  status: REQUIRED
  required_content:
    prevailing_wages:
      requirement: REQUIRED
      trigger: "Public works project in Maryland; contract > $250,000"
      statute: "Maryland Labor and Employment Article §17-201 et seq."
      content: >
        Subcontractor shall pay all workers on the Project not less than the
        prevailing wage rates determined by the Maryland Department of Labor
        for Baltimore City for the applicable classifications.
      rate_publication: "Maryland DLLR prevailing wage determination in effect on bid date"

    certified_payrolls:
      requirement: REQUIRED
      form: "WH-347 or equivalent format with Statement of Compliance"
      frequency: "Weekly; submitted within 7 days of payroll period close"
      recipient: "Contractor; Contractor to transmit to Owner as required"
      retention: "Subcontractor retains 3 years"

    mbe_wbe_participation:
      requirement: REQUIRED
      owner: "Baltimore City Public Schools"
      mbe_goal: "30% of Subcontract value"
      wbe_goal: "7% of Subcontract value"
      plan_reference: "Exhibit B – MBE/WBE Participation Plan"
      reporting: "Monthly MBE/WBE utilization reports with each Application for Payment"
      note: >
        If Subcontractor is not itself an MBE/WBE, it must identify and contract
        with qualified MBE/WBE suppliers and sub-subcontractors. Good faith effort
        documentation required if goals cannot be achieved.

    eeo_compliance:
      requirement: REQUIRED
      content: "Compliance with Title VII, Executive Order 11246, ADA, and all applicable EEO laws"

    drug_free_workplace:
      requirement: REQUIRED
      content: >
        Subcontractor shall maintain a drug-free workplace program compliant with
        Maryland law and Owner's requirements. Random testing permitted.

    e_verify:
      requirement: REQUIRED
      content: "Subcontractor shall use E-Verify for all new hires assigned to this Project"


# =============================================================================
# ARTICLE 10 – INDEMNIFICATION
# =============================================================================
article_10_indemnification:
  status: REQUIRED
  required_content:
    scope:
      requirement: REQUIRED
      indemnitor: "Subcontractor"
      indemnitees:
        - "Contractor"
        - "Owner"
        - "Architect"
        - "Their respective officers, directors, employees, agents"

    trigger:
      requirement: REQUIRED
      standard: "intermediate_form"
      content: >
        Claims arising out of or resulting from Subcontractor's performance,
        to the extent caused by Subcontractor's (or its sub-subcontractors')
        negligent acts or omissions.

    carve_out:
      requirement: REQUIRED
      content: >
        Indemnity does not apply to extent claims arise from indemnitees' own negligence.
        (Avoid broad-form indemnity – unenforceable under Maryland law for indemnitor's
        sole negligence.)

    defense_obligation:
      requirement: REQUIRED
      content: "Defense duty triggered upon tender; Subcontractor to provide and pay defense costs"

    insurance_relationship:
      requirement: REQUIRED
      content: "Indemnity obligation is in addition to, not a substitute for, insurance requirements"


# =============================================================================
# ARTICLE 11 – WARRANTY
# =============================================================================
article_11_warranty:
  status: REQUIRED
  required_content:
    general_warranty:
      requirement: REQUIRED
      duration: "One (1) year from date of Substantial Completion of the Project"
      scope: "Free from defects in materials and workmanship"

    extended_warranties:
      requirement: REQUIRED
      items:
        - spec: "09 64 66"
          description: "Wood Athletic Flooring Field Finish System"
          duration: "Two (2) years"
          period_from: "Substantial Completion"
          spec_ref: "[PER_SPEC 09 64 66 §1.8]"

        - spec: "09 67 23"
          description: "Resinous Flooring System (materials AND workmanship)"
          duration: "One (1) year minimum"
          form: "Joint manufacturer/installer single warranty document"
          spec_ref: "[PER_SPEC 09 67 23 §1.6]"
          note: >
            Spec requires either: (a) single written warranty from manufacturer covering
            both material and workmanship; OR (b) joint and several warranty signed on
            one document by both manufacturer and applicator.
            Sample warranty letter required with bid (bid may be disqualified without it).

    warranty_obligations:
      requirement: REQUIRED
      content:
        - "Upon written notice of defect, Subcontractor shall commence corrective work within 48 hours"
        - "Subcontractor bears all costs to remove, replace, and restore any work disturbed to access defective work"
        - "Contractor may perform corrective work at Subcontractor's expense after 5 days' written notice if Subcontractor fails to respond"

    warranty_exclusions:
      requirement: CONDITIONAL
      content: "Normal wear, Owner misuse, Owner failure to follow maintenance requirements"


# =============================================================================
# ARTICLE 12 – SAFETY
# =============================================================================
article_12_safety:
  status: REQUIRED
  required_content:
    osha_compliance:
      requirement: REQUIRED
      standards:
        - "OSHA 29 CFR Part 1926 (Construction Safety)"
        - "OSHA 29 CFR Part 1910 (General Industry, where applicable)"
        - "Maryland OSHA requirements"

    site_safety_plan:
      requirement: REQUIRED
      content: "Subcontractor shall comply with Contractor's Site-Specific Safety Plan and submit Activity Hazard Analysis for all flooring operations"

    safety_reporting:
      requirement: REQUIRED
      items:
        - "Daily toolbox safety talks (documented)"
        - "Weekly safety reports to Contractor"
        - "Immediate verbal notification of any injury or incident, followed by written report within 24 hours"

    hazardous_materials:
      requirement: REQUIRED
      content: "Subcontractor shall provide SDS for all adhesives, coatings, and solvents; comply with OSHA Hazard Communication Standard"

    dust_containment:
      requirement: REQUIRED
      trigger: "Gymnasium floor sanding operations"
      spec_ref: "[PER_SPEC 09 64 66 §3.2-C-2]"
      content: "Take precautions to contain dust during sanding; remove dust by vacuum"

    environmental_conditions:
      requirement: REQUIRED
      content: >
        Subcontractor is responsible for verifying that ambient temperature, humidity,
        and substrate conditions comply with each manufacturer's and specification
        requirements before commencing installation.


# =============================================================================
# ARTICLE 13 – DEFAULT AND TERMINATION
# =============================================================================
article_13_default_termination:
  status: REQUIRED
  required_content:
    default_by_subcontractor:
      requirement: REQUIRED
      triggers:
        - "Failure to supply sufficient labor, materials, or equipment"
        - "Failure to comply with any provision of the Agreement"
        - "Insolvency, bankruptcy filing, or general assignment for benefit of creditors"
        - "Failure to correct defective work"
      cure_period: "7 calendar days after written notice (24 hours for safety violations)"
      contractor_remedies:
        - "Complete Work by own forces or other contractors"
        - "Charge all excess costs and damages to Subcontractor"
        - "Withhold payment due Subcontractor and apply to costs"
        - "Terminate Agreement upon written notice if cure period expires"

    termination_for_convenience:
      requirement: REQUIRED
      notice_period: "7 calendar days written notice"
      compensation:
        - "Payment for Work properly performed to date"
        - "Cost of materials delivered and stored"
        - "Termination fee: 5% of remaining Contract Sum, not to exceed $50,000"
        - "No compensation for anticipated profit on unperformed Work"

    suspension_of_work:
      requirement: REQUIRED
      content: >
        If Owner suspends prime contract, Contractor may suspend this Subcontract.
        Subcontractor entitled to equitable adjustment for documented costs of suspension.


# =============================================================================
# ARTICLE 14 – DISPUTE RESOLUTION
# =============================================================================
article_14_dispute_resolution:
  status: REQUIRED
  required_content:
    notice_of_claim:
      requirement: REQUIRED
      content: "Claims must be submitted in writing within 21 days of the event giving rise to the claim"
      consequence: "Failure to provide timely notice waives claim"

    negotiation:
      requirement: REQUIRED
      timeline: "15 days from written notice to attempt direct resolution"

    mediation:
      requirement: REQUIRED
      provider: "JAMS or AAA"
      timing: "Before proceeding to arbitration"
      cost_sharing: "Equal shares unless mediator allocates otherwise"

    arbitration:
      requirement: REQUIRED
      rules: "AAA Construction Industry Arbitration Rules"
      venue: "Baltimore, Maryland"
      number_of_arbitrators: "1 (under $500K); 3 (over $500K)"
      awards: "Final and binding; may be entered as judgment in any court of competent jurisdiction"

    governing_law:
      requirement: REQUIRED
      value: "State of Maryland"

    consolidation:
      requirement: CONDITIONAL
      content: >
        Subcontractor agrees that its dispute may be consolidated with related
        disputes between Contractor and Owner to avoid inconsistent results.


# =============================================================================
# ARTICLE 15 – GENERAL PROVISIONS
# =============================================================================
article_15_general_provisions:
  status: REQUIRED
  required_content:
    flow_down_clause:
      requirement: REQUIRED
      content: >
        All applicable terms and conditions of the Prime Contract are incorporated
        and flow down to Subcontractor. Subcontractor agrees to be bound to Contractor
        to the same extent Contractor is bound to Owner. Specifically includes:
        LEED requirements, equal opportunity provisions, drug-free workplace,
        non-discrimination, MBE/WBE requirements, prevailing wage requirements.

    lien_waivers:
      requirement: REQUIRED
      items:
        - "Conditional lien waiver for current billing period: required with each Application"
        - "Unconditional lien waiver for prior periods: required with each Application"
        - "Final unconditional lien waiver: required condition of final payment"
        - "Lower-tier lien waivers: Subcontractor must obtain from sub-subcontractors and major suppliers"
      legal_basis: "Maryland Code, Real Property §9-101 et seq. (Contractor's Bond Law)"

    assignment:
      requirement: REQUIRED
      content: "Subcontractor may not assign any rights or obligations without Contractor's prior written consent"

    entire_agreement:
      requirement: REQUIRED
      content: "This Agreement constitutes the entire agreement; supersedes all prior negotiations, representations, warranties"

    severability:
      requirement: REQUIRED

    notices:
      requirement: REQUIRED
      content: "Written notices: delivered by hand, overnight courier, or certified mail to addresses in this Agreement"

    subcontracting:
      requirement: REQUIRED
      content: >
        Subcontractor shall not sub-subcontract any portion of the Work without
        Contractor's prior written approval. All sub-subcontracts shall flow down
        all applicable provisions of this Agreement.

    clean_up:
      requirement: REQUIRED
      content: >
        Subcontractor shall continuously clean up debris from its Work.
        Final clean-up (broom-clean condition) required before Application for Final Payment.

    closeout_documents:
      requirement: REQUIRED
      submission_timing: "Prior to final payment"
      required_items:
        - "All required warranties (general + extended per Article 11)"
        - "Operation and Maintenance Manuals for all installed systems"
        - "Product data, maintenance instructions, cleaning requirements"
        - "Attic stock delivery receipt signed by Owner"
        - "As-built markup drawings"
        - "Spare tile and carpet quantities per specification requirements"
        - "Manufacturer care guides (AMFMA for wood floor; per spec for all others)"
        - "All LEED documentation not previously submitted"

    sales_tax_exemption:
      requirement: REQUIRED
      content: >
        Baltimore City Public Schools is a tax-exempt governmental entity.
        Contractor will provide Sales and Use Tax Exemption Certificate.
        Subcontractor is responsible for obtaining exemption for its purchases.
        Contract Sum excludes sales tax.


# =============================================================================
# EXHIBITS
# =============================================================================
exhibits:
  required_exhibits:
    - id: "Exhibit A"
      title: "Unit Price Schedule"
      content: "List of unit prices for all flooring scope items for change order valuation"
      requirement: REQUIRED

    - id: "Exhibit B"
      title: "MBE/WBE Participation Plan"
      content: "Identified MBE/WBE firms, scope, and dollar commitments"
      requirement: REQUIRED

    - id: "Exhibit C"
      title: "Schedule of Values"
      content: "Approved SOV by spec section; submitted within 10 days of execution"
      requirement: REQUIRED

    - id: "Exhibit D"
      title: "Project Schedule"
      content: "Current Contractor master CPM schedule showing Subcontractor milestones"
      requirement: REQUIRED

    - id: "Exhibit E"
      title: "Subcontractor's Bid Proposal"
      content: "Awarded bid document; for reference only; scope per Article 2 governs"
      requirement: REQUIRED
      note: "Mark 'INFORMATIONAL ONLY – NOT TO GOVERN SCOPE'"


# =============================================================================
# SECONDARY – Validation rules the skill output must satisfy
# =============================================================================
validation_rules:

  structural_completeness:
    - rule: "All 15 Articles must be present in document"
      severity: CRITICAL

    - rule: "Cover page must include all 13 required fields"
      severity: CRITICAL

    - rule: "All 6 spec sections must be individually described in Article 2 scope"
      severity: CRITICAL

    - rule: "Inclusions list must contain all 12 required items"
      severity: HIGH

    - rule: "Exclusions list must contain all 4 required items at minimum"
      severity: HIGH

    - rule: "All 5 required Exhibits must be referenced"
      severity: HIGH

  commercial_terms_accuracy:
    - rule: "Contract Sum matches awarded bid amount in both numerals and words"
      severity: CRITICAL

    - rule: "Retainage stated as 10% reducing to 5% at 50% completion"
      severity: CRITICAL

    - rule: "Pay-when-paid includes backstop payment timeline (not pure pay-if-paid)"
      severity: CRITICAL
      legal_note: "Pure pay-if-paid clauses face enforceability risk in Maryland"

    - rule: "Change order markup rates stated (10% OH + 10% profit self-performed; 10% total on sub-tier)"
      severity: HIGH

    - rule: "Liquidated damages flow-down provision present"
      severity: HIGH

  scope_specific_rules:
    - rule: "Waterproofing membrane explicitly called out as scope item in 09 30 00 (not silently bundled)"
      severity: CRITICAL
      rationale: "This is the most commonly missed tile scope item; spec 09 30 00 §3.4 makes it mandatory"

    - rule: "Rubber stair treads listed separately from rubber tile at stair landings"
      severity: HIGH
      rationale: "Different units (EA vs SF), different spec items; must be distinguishable"

    - rule: "Ventilating rubber cove base at gymnasium explicitly listed (not standard base)"
      severity: HIGH
      rationale: "Spec 09 64 66 §2.3-C requires ventilating type; standard cove base is non-compliant"

    - rule: "Gymnasium polyurethane finish system identified as separate from rough floor installation"
      severity: HIGH
      rationale: "Enables closeout tracking; prevents finish being treated as included in SF rate silently"

    - rule: "Resinous flooring mockup requirement stated in scope (48\"×48\", Architect/Owner approval)"
      severity: HIGH
      spec_ref: "09 67 23 §1.3-E"

    - rule: "Resinous flooring installer certification requirement stated"
      severity: HIGH
      spec_ref: "09 67 23 §1.3-B"

    - rule: "Gymnasium 60-day concrete cure requirement in schedule article"
      severity: HIGH
      spec_ref: "09 64 66 §1.7-C"

    - rule: "FSC chain-of-custody documentation for maple flooring listed in submittals"
      severity: MEDIUM
      spec_ref: "09 64 66 §1.4-F"

    - rule: "Walk-in cooler/freezer exclusion (Rooms 1415, 1416) explicitly stated"
      severity: HIGH
      rationale: "Scope ambiguity issue; these rooms appear in the finish schedule adjacent to other kitchen areas"

  legal_compliance:
    - rule: "Prevailing wage provision references Maryland L&E Article §17-201 et seq."
      severity: CRITICAL
      trigger: "Public school project in Maryland with contract > $250,000"

    - rule: "Certified payroll submission requirement stated (weekly, WH-347 or equivalent)"
      severity: CRITICAL

    - rule: "MBE/WBE participation goals stated (30% MBE / 7% WBE minimum for BCPS)"
      severity: CRITICAL

    - rule: "Performance and Payment Bond required (100% each; AIA A312)"
      severity: CRITICAL
      trigger: "Public works contract > $100,000 in Maryland"

    - rule: "Indemnity clause does not require Subcontractor to indemnify for indemnitee's sole negligence"
      severity: CRITICAL
      legal_note: "Broad-form indemnity for indemnitee's sole negligence is unenforceable in Maryland"

    - rule: "Lien waiver requirements specified (conditional current + unconditional prior with each pay app)"
      severity: HIGH
      legal_note: "Maryland Real Property §9-101 governs; unconditional waivers before payment receipt can be void"

    - rule: "Governing law stated as Maryland"
      severity: HIGH

    - rule: "Sales tax exemption provision present"
      severity: MEDIUM
      rationale: "Baltimore City Public Schools is tax-exempt; Contract Sum excludes sales tax"

  format_quality:
    - rule: "Document formatted as Word (.docx)"
      severity: CRITICAL

    - rule: "Articles use consistent heading numbering (Article 1, 1.1, 1.2 structure)"
      severity: HIGH

    - rule: "Contract Sum appears in both numeral and written-word format"
      severity: HIGH

    - rule: "Signature blocks present for both Contractor and Subcontractor on cover page"
      severity: CRITICAL

    - rule: "Page numbering present"
      severity: MEDIUM

    - rule: "Subcontract number present in header or cover page"
      severity: MEDIUM


# =============================================================================
# KNOWN SCOPE RISK FLAGS  (for skill to check and prompt GC to address)
# =============================================================================
scope_risk_flags:
  - flag: "Gymnasium floor pricing method"
    detail: >
      Some bidders bundle sanding, finishing, and game lines into the gym SF rate
      (Bids 01, 04, 05); others break them out separately (Bid 07). The subcontract
      must make explicit whether the finish system and game lines are in the SF rate
      or separate line items in the SOV to prevent dispute at closeout.
    recommendation: "Require SOV to show gym finish and game lines as separate identifiable values"

  - flag: "Resinous flooring – Stonhard vs. approved equal"
    detail: >
      Spec 09 67 23 names Stonhard Stonclad UT as Basis-of-Design. Substitutions
      require 10-day pre-bid submittal and Architect approval. If subcontractor
      bid an alternate, written approval must be in the subcontract.
    recommendation: "Confirm product selection in Article 2 or an exhibit"

  - flag: "Tile color selection timing"
    detail: >
      Ceramic tile (up to 50% from highest price group), BBT (up to 12 colors),
      carpet tile (up to 4 colors) selections not yet finalized at contract execution.
      Premium colors could affect material costs.
    recommendation: >
      Include clause: 'Premium color surcharges, if any, shall be submitted
      as a Change Order request within 10 days of Architect's color selection.'

  - flag: "Prevailing wage rate classification"
    detail: >
      Maryland prevailing wage classifications for flooring work may include:
      Tile Setter, Terrazzo Worker, Floor Layer/Resilient Floor Coverer, Painter
      (for game lines). Subcontractor must apply correct trade classification per
      Maryland DLLR determination.
    recommendation: "Attach prevailing wage rate schedule as Exhibit F"

  - flag: "Out-of-state subcontractor (if applicable)"
    detail: >
      If subcontractor is not domiciled in Maryland (e.g., Bid 08 – Delaware),
      verify MD contractor license registration is current before execution.
      Maryland Md. Code Bus. Occ. & Prof. §17-401 requires licensure.
    recommendation: "Obtain MD license number and verify active status before award"

  - flag: "Resinous flooring moisture requirements – elevated slab"
    detail: >
      Spec 09 67 23 §3.1-B requires both ASTM F2170 (RH probe, ≤85%) AND
      ASTM F1869 (calcium chloride, ≤7 lb/1000SF/24hr) before proceeding.
      Subcontract should allocate risk of failed tests and remediation costs.
    recommendation: >
      Add clause: 'If moisture testing fails, Subcontractor shall notify
      Contractor in writing within 48 hours. Cost of remediation is
      Owner's/Contractor's responsibility unless caused by Subcontractor's
      early installation.'
